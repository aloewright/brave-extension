name = "agent-app"
main = "src/index.ts"
compatibility_date = "2025-01-28"
compatibility_flags = ["nodejs_compat"]

# Alias the Node-only `esbuild` package (used by @tanstack/ai-code-mode's
# stripTypeScript) to a pure-JS, Worker-compatible type-stripper shim. The real
# esbuild relies on __filename + a native binary and throws
# "__filename is not defined" in the Workers runtime. See src/esbuild-shim.ts.
[alias]
esbuild = "./src/esbuild-shim.ts"

# Workers Logs — captures console output (our structured JSON log lines) so the
# app request flow + AI calls are observable in the dashboard and `wrangler tail`.
[observability]
enabled = true
head_sampling_rate = 1.0

[[routes]]
pattern = "agent.fly.pm"
custom_domain = true

# TanStack SPA served from the same Worker. /api/* hits Hono; everything else
# falls through to the asset bundle, with SPA-style fallback to index.html.
[assets]
directory = "./dist/web"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Shared with worker/ (sidebar-api). Same database_id so data is shared.
[[d1_databases]]
binding = "DB"
database_name = "sidebar"
database_id = "5de7b694-0bc8-4073-9c3b-497076216901"
migrations_dir = "./migrations"

# Shared R2 bucket.
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "sidebar-blobs"

# Shared Vectorize index.
[[vectorize]]
binding = "VECTORS"
index_name = "sidebar-search"

# Workers AI through gateway "x" (used in Plan 2).
[ai]
binding = "AI"

# New KV namespace for model catalog cache + per-user prefs.
# Create with: wrangler kv namespace create agent-kv  (paste the id below)
[[kv_namespaces]]
binding = "AGENT_KV"
id = "6a620f2c4f7e4888b4650e769dec4c89"

# Agents SDK Durable Object.
[[durable_objects.bindings]]
name = "CHAT_AGENT"
class_name = "ChatAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatAgent"]

# Dynamic Worker Loading — runs model-generated Code Mode code in an isolate (no agent-app bindings). Endpoint /internal/code-exec guarded by CODE_EXEC_TOKEN. See docs/superpowers/specs/2026-06-07-agent-code-mode-tools-design.md
[[worker_loaders]]
binding = "LOADER"

# Run memory consolidation every 6 hours (4x/day).
[triggers]
crons = ["0 */6 * * *"]
