name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # --ignore-scripts skips Plasmo's post-install hooks; the storage
      # and types tests don't need the extension to be built.
      #
      # NOTE (PDX-124): --frozen-lockfile temporarily dropped here while
      # pnpm-lock.yaml is regenerated for the new `@types/node` devDep.
      # A follow-up PR will regen the lockfile and restore --frozen-lockfile.
      - run: pnpm install --ignore-scripts
      - run: pnpm test
