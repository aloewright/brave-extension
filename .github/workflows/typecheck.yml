name: typecheck

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    # Scaffolding gate (PDX-124): we run `tsc --noEmit` on every PR/push to
    # publish typecheck status, but the job is non-blocking until a follow-up
    # flips `continue-on-error: false`. This gives downstream branches a
    # window to clean up any drift introduced before the gate landed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # --ignore-scripts skips Plasmo's post-install hooks; the typecheck
      # only needs the TS toolchain + types, not the built extension.
      #
      # NOTE (PDX-124): --frozen-lockfile temporarily dropped here while
      # pnpm-lock.yaml is regenerated for the new `@types/node` devDep.
      # A follow-up PR will regen the lockfile and restore --frozen-lockfile.
      - run: pnpm install --ignore-scripts
      - run: pnpm typecheck
