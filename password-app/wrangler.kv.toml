# Custom go app, based on NodeWarden.
# KV-mode fallback is here for accounts that cannot or should not use R2.
name = "go"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true
preview_urls = false

[build]
command = "npm run build"

[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = false

[triggers]
crons = [ "*/5 * * * *" ]

[[d1_databases]]
binding = "DB"
database_name = "go-db"
database_id = "67b1c313-c6a9-4c3b-97b5-ac2ba625ec5a"

[[durable_objects.bindings]]
name = "NOTIFICATIONS_HUB"
class_name = "GoNotificationsHub"

[[durable_objects.bindings]]
name = "BACKUP_TRANSFER_RUNNER"
class_name = "GoBackupTransferRunner"

[[kv_namespaces]]
binding = "ATTACHMENTS_KV"

[[migrations]]
tag = "v1-notifications-hub"
new_sqlite_classes = [ "NotificationsHub" ]

[[migrations]]
tag = "v2-backup-transfer-runner"
new_sqlite_classes = [ "BackupTransferRunner" ]

[[migrations]]
tag = "v3-go-resource-names"
renamed_classes = [
  { from = "NotificationsHub", to = "GoNotificationsHub" },
  { from = "BackupTransferRunner", to = "GoBackupTransferRunner" },
]
